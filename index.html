<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="NovaCommerce" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#3b82f6" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- SEO Meta Tags -->
    <title>NovaCommerce - Modern E-commerce Platform</title>
    <meta name="description" content="A fully customizable, production-ready e-commerce platform for any store type. Shop the latest trends with fast delivery and great prices." />
    <meta name="keywords" content="ecommerce, online shopping, modern store, fashion, electronics, home goods" />
    <meta name="author" content="NovaCommerce" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="NovaCommerce - Modern E-commerce Platform" />
    <meta property="og:description" content="A fully customizable, production-ready e-commerce platform for any store type." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:url" content="/" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NovaCommerce - Modern E-commerce Platform" />
    <meta name="twitter:description" content="A fully customizable, production-ready e-commerce platform for any store type." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#3b82f6" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preload Critical Resources -->
    <link rel="preload" href="/src/main.jsx" as="script" />
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />

    <!-- Performance and Mobile Optimizations -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />

    <!-- Prevent FOUC -->
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      }

      #root {
        min-height: 100vh;
      }

      /* Prevent flash of unstyled content */
      .loading-spinner {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      }

      .loading-spinner::after {
        content: '';
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Mobile optimizations */
      @media (max-width: 768px) {
        html {
          font-size: 16px;
        }

        body {
          -webkit-text-size-adjust: 100%;
          -webkit-touch-callout: none;
          -webkit-user-select: none;
          -webkit-tap-highlight-color: transparent;
        }

        /* Safe area for notched devices */
        .pb-safe {
          padding-bottom: env(safe-area-inset-bottom);
        }
      }

      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
      }

      /* Reduced motion support */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading fallback -->
      <div class="loading-spinner"></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Performance monitoring -->
    <script>
      // Core Web Vitals tracking
      if ('web-vitals' in window) {
        import('https://unpkg.com/web-vitals@3/dist/web-vitals.attribution.js').then(({ getCLS, getFID, getFCP, getLCP, getTTFB }) => {
          getCLS(console.log);
          getFID(console.log);
          getFCP(console.log);
          getLCP(console.log);
          getTTFB(console.log);
        });
      }

      // Error tracking
      window.addEventListener('error', (event) => {
        console.error('Global error:', event.error);
        // Send to error reporting service in production
      });

      window.addEventListener('unhandledrejection', (event) => {
        console.error('Unhandled promise rejection:', event.reason);
        // Send to error reporting service in production
      });
    </script>
  </body>
</html>
